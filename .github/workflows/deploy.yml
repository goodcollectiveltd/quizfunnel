name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Optional — set these as repo Secrets (Settings → Secrets → Actions) to switch
          # on tracking/email. Empty is fine; the app no-ops without them.
          VITE_META_PIXEL_ID: ${{ secrets.VITE_META_PIXEL_ID }}
          VITE_GA4_ID: ${{ secrets.VITE_GA4_ID }}
          VITE_KLAVIYO_PUBLIC_KEY: ${{ secrets.VITE_KLAVIYO_PUBLIC_KEY }}
          VITE_KLAVIYO_LIST_ID: ${{ secrets.VITE_KLAVIYO_LIST_ID }}
      # SPA fallback: serve index.html for any path (GitHub Pages has no rewrites).
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
